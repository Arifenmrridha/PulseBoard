# Google Cloud Scheduler Job declaration for PulseBoard
# Use this YAML to configure via Terraform or gcloud scheduler jobs update yaml
apiVersion: scheduler.cnrm.cloud.google.com/v1beta1
kind: SchedulerJob
metadata:
  name: pulseboard-daily-trigger
  namespace: default
spec:
  description: "PulseBoard multi-agent KPI anomaly detection & report delivery pipeline daily run"
  schedule: "0 9 * * 1-5" # Daily Monday-Friday at 9:00 AM
  timeZone: "UTC"
  httpTarget:
    uri: "https://pulseboard-service-xyz.run.app"
    httpMethod: "POST"
    body: "eyJyZWNpcGllbnQiOiAiZXhlY3V0aXZlQGNvbXBhbnkuY29tIiwgInJvbGUiOiAiRXhlY3V0aXZlIn0=" # Base64 encoded payload: {"recipient": "executive@company.com", "role": "Executive"}
    headers:
      Content-Type: "application/json"
    oidcToken:
      serviceAccountEmail: "pulseboard-scheduler-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com"
      audience: "https://pulseboard-service-xyz.run.app"
